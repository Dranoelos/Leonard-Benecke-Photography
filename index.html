<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Léonard Benecke Photography. Events, portraits and automotive work."
    />
    <title>Léonard Benecke Photography</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2311110f'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='24' fill='%23f4f1ea'%3ELB%3C/text%3E%3C/svg%3E" />
    <link rel="preload" as="image" href="images/COVER/001.jpg" fetchpriority="high" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Léonard Benecke Photography home">
        <span>Léonard Benecke</span>
        <small>Photography</small>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        Menu
      </button>

      <nav id="site-nav" class="site-nav" aria-label="Main navigation">
        <a href="#events">Events</a>
        <a href="#portraits">Portraits</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-label="Featured video">
        <video autoplay muted loop playsinline preload="auto" poster="images/COVER/001.jpg">
          <source src="images/CoverVideoHDR.mp4" type="video/mp4" media="(dynamic-range: high)" />
          <source src="images/CoverVideoSDR.mp4" type="video/mp4" />
          <img src="images/COVER/001.jpg" alt="Blue-lit crowd behind the DJ" />
        </video>
        <div class="hero-meta">
          <p>Photo / Video</p>
          <p>München</p>
        </div>
      </section>

      <nav class="category-nav" aria-label="Page sections">
        <a href="#events">Events</a>
        <a href="#portraits">Portraits</a>
        <a href="#contact">Contact</a>
      </nav>

      <section id="events" class="gallery-section" aria-labelledby="events-title">
        <div class="section-heading">
          <p>01</p>
          <h1 id="events-title">Events</h1>
        </div>

        <div class="photo-grid photo-grid-events">
          <figure>
            <img src="images/events/001-hiphopisland.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/002-hiphopisland.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/003-lucky.jpg" alt="Event photograph" />
          </figure>
          <figure class="photo-wide">
            <img src="images/events/004-goru.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/005-lucky.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/006-goru.jpg" alt="Event photograph" />
          </figure>
          <figure class="photo-panorama">
            <img src="images/events/007-goru.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/008-hiphopisland.jpg" alt="Event photograph" />
          </figure>
          <figure class="photo-wide">
            <img src="images/events/009-lucky.jpg" alt="Event photograph" />
          </figure>
          <figure>
            <img src="images/events/011-hiphopisland.jpg" alt="Event photograph" />
          </figure>
        </div>
      </section>

      <section id="portraits" class="gallery-section" aria-labelledby="portraits-title">
        <div class="section-heading">
          <p>02</p>
          <h1 id="portraits-title">Portraits</h1>
        </div>

        <div class="photo-grid photo-grid-portrait">
          <figure>
            <img src="images/portraits/001.jpg" alt="Portrait photograph" />
          </figure>
          <figure>
            <img src="images/portraits/002.jpg" alt="Portrait photograph" />
          </figure>
          <figure class="photo-wide">
            <img src="images/portraits/003.jpg" alt="Portrait photograph" />
          </figure>
          <figure>
            <img src="images/portraits/004.jpg" alt="Portrait photograph" />
          </figure>
          <figure>
            <img src="images/portraits/005.jpg" alt="Portrait photograph" />
          </figure>
          <figure class="photo-wide">
            <img src="images/portraits/006.jpg" alt="Portrait photograph" />
          </figure>
          <figure>
            <img src="images/portraits/008.jpg" alt="Portrait photograph" />
          </figure>
          <figure class="photo-panorama">
            <img src="images/portraits/009.jpg" alt="Portrait photograph" />
          </figure>
          <figure>
            <img src="images/portraits/010.jpg" alt="Portrait photograph" />
          </figure>
        </div>
      </section>

      <section id="contact" class="contact" aria-label="Contact">
        <a href="mailto:benecke.leonard@gmail.com">benecke.leonard@gmail.com</a>
        <a href="https://www.instagram.com/leonardbenecke/">@leonardbenecke</a>
        <p>© <span id="year"></span> Léonard Benecke</p>
      </section>
    </main>
  </body>
</html>
